name: Validate kas configs
on:
  push:
    branches: [main]
    paths:
      - 'kas-project.yml'
      - 'kas/**'
      - 'meta-physical-ai/conf/**'
      - 'meta-physical-ai/recipes-core/images/**'
      - 'build.sh'
  pull_request:
    branches: [main]
    paths:
      - 'kas-project.yml'
      - 'kas/**'
      - 'meta-physical-ai/conf/**'
      - 'meta-physical-ai/recipes-core/images/**'
      - 'build.sh'

jobs:
  validate-yaml:
    name: YAML syntax
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Validate all kas YAML files
        run: |
          python3 -c "
          import yaml, sys, glob
          files = ['kas-project.yml'] + glob.glob('kas/*.yml')
          ok = True
          for f in files:
              try:
                  yaml.safe_load(open(f))
                  print(f'  OK  {f}')
              except yaml.YAMLError as e:
                  print(f'  FAIL {f}: {e}', file=sys.stderr)
                  ok = False
          sys.exit(0 if ok else 1)
          "

  validate-kas:
    name: kas config check
    runs-on: ubuntu-22.04
    needs: validate-yaml
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install kas
        run: pip install -r requirements.txt

      - name: kas check (validates layer includes, no fetch)
        run: kas check kas-project.yml
        env:
          # kas check will try to reach remotes — fail fast on network errors
          KAS_CLONE_DEPTH: 1

  validate-layer-conf:
    name: layer.conf sanity
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Check LAYERSERIES_COMPAT contains scarthgap
        run: |
          grep -r "LAYERSERIES_COMPAT" meta-physical-ai/conf/layer.conf | grep -q "scarthgap" \
            && echo "OK: scarthgap declared in LAYERSERIES_COMPAT" \
            || (echo "FAIL: scarthgap missing from LAYERSERIES_COMPAT" && exit 1)

      - name: Check no branch-name refspecs in layers.yml
        run: |
          python3 - <<'EOF'
          import yaml, sys
          data = yaml.safe_load(open('kas/layers.yml'))
          repos = data.get('repos', {})
          fail = False
          for name, cfg in repos.items():
              if isinstance(cfg, dict) and 'path' not in cfg:  # skip local path repos
                  ref = cfg.get('refspec', '')
                  # A 40-char hex string is a commit SHA
                  if ref and len(ref) == 40 and all(c in '0123456789abcdef' for c in ref):
                      print(f'  OK  {name}: {ref[:12]}...')
                  elif ref:
                      print(f'WARN: {name} refspec "{ref}" looks like a branch/tag, not a SHA')
                      fail = True
          sys.exit(1 if fail else 0)
          EOF

      - name: Check layer paths use dot-notation for flat repos
        run: |
          python3 - <<'EOF'
          import yaml, os, sys
          # Warn if a layer key matches the repo name exactly AND no such subdir exists
          # (common mistake: meta-tegra: instead of .:)
          data = yaml.safe_load(open('kas/layers.yml'))
          for repo_name, cfg in data.get('repos', {}).items():
              if not isinstance(cfg, dict):
                  continue
              base = cfg.get('path', repo_name)
              layers = cfg.get('layers', {})
              if not layers:
                  continue
              for layer_key in layers:
                  if layer_key in ('.', ''):
                      continue
                  candidate = os.path.join(base, layer_key)
                  if not os.path.isdir(candidate):
                      print(f'WARN: {repo_name}: layer key "{layer_key}" but directory "{candidate}" does not exist')
                      print(f'      Consider using "." if the layer is at the repo root')
          EOF

      - name: Check keys are not committed
        run: |
          if git ls-files keys/ | grep -q '.'; then
            echo "FAIL: signing keys detected in git index!"
            git ls-files keys/
            exit 1
          else
            echo "OK: keys/ not tracked"
          fi

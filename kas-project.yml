# =============================================================================
# kas-project.yml — Hardened Jetson Orin Nano BSP (dm-verity + read-only rootfs)
# =============================================================================
# This is the TOP-LEVEL entry point. It declares hardware target and includes
# the composable sub-configs from kas/. Edit sub-configs for specific concerns:
#
#   kas/layers.yml           → Add/update Yocto layer repos & commit pins
#   kas/local-conf.yml       → Build system settings (cache, dm-verity, tuning)
#   kas/image-packages.yml   → Packages installed ON the Jetson (rootfs)
#   kas/sdk.yml              → Cross-compile SDK host tools & target sysroot libs
#
# Build:          kas build kas-project.yml
# Shell:          kas shell kas-project.yml -c "bitbake-layers show-layers"
# Override merge: kas build kas-project.yml:/tmp/kas-override.yml
# =============================================================================
header:
  version: 14
  includes:
    - kas/layers.yml
    - kas/local-conf.yml
    - kas/image-packages.yml
    - kas/sdk.yml

machine: jetson-orin-nano-devkit-nvme
distro: tegra
target:
  - demo-image-base

# =============================================================================
# kas/local-conf.yml — Build system configuration (local.conf overrides)
# =============================================================================
# Contains: init manager, cache paths, dm-verity signing, security hardening,
# and build parallelism tuning. These are build-system concerns — not image
# content. For image packages see image-packages.yml, for SDK see sdk.yml.
# =============================================================================
header:
  version: 14

local_conf_header:

  # --- Init system: systemd ---
  init: |
    INIT_MANAGER = "systemd"
    DISTRO_FEATURES:append = " systemd"
    DISTRO_FEATURES:remove = "sysvinit"
    VIRTUAL-RUNTIME_init_manager = "systemd"
    VIRTUAL-RUNTIME_initscripts = "systemd-compat-units"

  # --- Persistent download & sstate cache ---
  # Paths are relative to the workspace root (one level above the build dir).
  # Share these directories across machines via NFS for faster rebuilds.
  cache: |
    DL_DIR ?= "${TOPDIR}/../downloads"
    SSTATE_DIR ?= "${TOPDIR}/../sstate-cache"

  # --- dm-verity (RSA-3K signed) ---
  # Keys must be generated before build — see README.md § DM-Verity Signing.
  # Keys are excluded from git via .gitignore.
  # Disable: build.sh --no-dm-verity  (injects IMAGE_CLASSES:remove = "dm-verity-img")
  dm-verity: |
    DISTRO_FEATURES:append = " security integrity"
    IMAGE_CLASSES += "dm-verity-img"
    DM_VERITY_IMAGE = "demo-image-base"
    DM_VERITY_IMAGE_TYPE = "ext4"
    DM_VERITY_SIGNING_KEY = "${TOPDIR}/../keys/dm-verity/rsa3k-key.pem"
    DM_VERITY_SIGNING_CERT = "${TOPDIR}/../keys/dm-verity/rsa3k-cert.pem"

  # --- Security hardening ---
  # Removes debug-tweaks (empty root password, debug serial) from the image.
  # read-only-rootfs is also enforced via systemd drop-in in meta-physical-ai.
  hardening: |
    IMAGE_FEATURES:remove = "debug-tweaks"
    EXTRA_IMAGE_FEATURES = ""
    IMAGE_FEATURES:append = " read-only-rootfs"
    SYSTEMD_ROOTFS_RO_DROPIN ?= "1"

  # --- Dev access: empty root password (REMOVE FOR PRODUCTION) ---
  # Enables serial/SSH login as root with no password for development.
  # Does NOT re-enable debug-tweaks (no passwordless sudo, no debug serial).
  # Remove this block when building production images.
  # NOTE: both features are required:
  #   empty-root-password  → removes root's password hash (passwd -d root)
  #   allow-empty-password → sets PermitEmptyPasswords yes in sshd_config
  #   allow-root-login     → sets PermitRootLogin yes in sshd_config
  dev-access: |
    IMAGE_FEATURES:append = " empty-root-password allow-empty-password allow-root-login"

  # --- Build tuning (defaults, overridden at runtime by build.sh) ---
  # build.sh --cores N will inject BB_NUMBER_THREADS/PARALLEL_MAKE overrides
  # via a kas merge config, superseding these defaults.
  tuning: |
    BB_NUMBER_THREADS ?= "${@int(os.cpu_count() * 0.8)}"
    PARALLEL_MAKE ?= "-j ${@int(os.cpu_count() * 0.8)}"
